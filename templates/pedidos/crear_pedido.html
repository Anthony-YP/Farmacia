{% extends 'base.html' %}

{% block title %}Crear Pedido{% endblock %}

{% block content %}
<div class="container mt-5">
    <div class="card shadow-sm p-4">
        <h1 class="mb-4">Crear Pedido</h1>
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                {{ form.as_p }}
            </div>

            <h2 class="mb-3">Seleccionar Productos</h2>
            <table class="table table-bordered table-hover">
                <thead class="table-light">
                    <tr>
                        <th>Producto</th>
                        <th>Cantidad</th>
                    </tr>
                </thead>
                <tbody>
                    {% for producto in productos %}
                    <tr>
                        <td>
                            <div class="form-check">
                                <input class="form-check-input" type="checkbox" name="productos" value="{{ producto.id }}" id="producto{{ producto.id }}">
                                <label class="form-check-label" for="producto{{ producto.id }}">{{ producto.nombre }}</label>
                            </div>
                        </td>
                        <td>
                            <input type="number" name="cantidades" min="1" class="form-control" placeholder="Cantidad">
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>

            <div class="d-grid gap-2 mt-3">
                <button type="submit" class="btn btn-primary">Crear Pedido</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
